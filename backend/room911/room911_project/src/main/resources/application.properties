# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/room_911_db
spring.datasource.username=postgres
spring.datasource.password=sebst-love16
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
